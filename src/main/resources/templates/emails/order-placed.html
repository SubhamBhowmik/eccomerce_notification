<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <style>
        body{font-family:Arial,sans-serif;background:#f4f4f4;margin:0}
        .container{max-width:600px;margin:40px auto;background:#fff;border-radius:12px;overflow:hidden}
        .header{background:#6366f1;color:#fff;padding:28px;text-align:center}
        .body{padding:32px}
        .order-box{background:#f8fafc;border-radius:8px;padding:16px;margin:16px 0}
        table{width:100%;border-collapse:collapse;margin:16px 0}
        th{background:#f1f5f9;padding:10px;text-align:left;font-size:13px}
        td{padding:10px;border-bottom:1px solid #f1f5f9;font-size:14px}
        .total{text-align:right;font-size:18px;font-weight:bold;margin-top:12px}
        .footer{text-align:center;padding:20px;font-size:12px;color:#94a3b8}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 style="margin:0;font-size:24px">Order Confirmed!</h1>
        <p style="margin:8px 0 0;opacity:.9">Thank you for shopping with us</p>
    </div>
    <div class="body">
        <p>Hi <strong th:text="${username}">Customer</strong>,</p>
        <p>Your order has been placed successfully!</p>
        <div class="order-box">
            Order ID: <strong th:text="${orderId}">ORD-123</strong>
        </div>
        <table>
            <thead><tr><th>Product</th><th>Qty</th><th>Price</th></tr></thead>
            <tbody>
            <tr th:each="item : ${items}">
                <td th:text="${item.productName}">Product</td>
                <td th:text="${item.quantity}">1</td>
                <td th:text="'₹' + ${item.price}">₹0</td>
            </tr>
            </tbody>
        </table>
        <div class="total">Total: ₹<span th:text="${total}">0</span></div>
    </div>
    <div class="footer">&copy; 2026 My Ecommerce Store</div>
</div>
</body>
</html>
