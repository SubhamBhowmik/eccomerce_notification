<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <style>
        body{font-family:Arial,sans-serif;background:#f4f4f4;margin:0}
        .container{max-width:600px;margin:40px auto;background:#fff;border-radius:12px;overflow:hidden}
        .header{background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;padding:40px;text-align:center}
        .discount{font-size:64px;font-weight:900;margin:0}
        .body{padding:32px;text-align:center}
        .btn{display:inline-block;background:#ef4444;color:#fff;padding:16px 40px;border-radius:8px;text-decoration:none;font-weight:bold;font-size:18px;margin-top:20px}
        .expires{color:#ef4444;font-size:13px;margin-top:12px}
        .footer{text-align:center;padding:20px;font-size:12px;color:#94a3b8}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <p style="margin:0 0 8px;font-size:13px;text-transform:uppercase;letter-spacing:2px">Limited Time Offer</p>
        <div class="discount" th:text="${discount}">70% OFF</div>
        <p style="margin:8px 0 0;font-size:18px" th:text="${offerTitle}">Biggest Sale!</p>
    </div>
    <div class="body">
        <p>Hi <strong th:text="${username}">Customer</strong>,</p>
        <p>Don't miss this exclusive deal. Shop now before it's gone!</p>
        <a href="#" class="btn">Shop Now</a>
        <p class="expires" th:text="'Expires: ' + ${expiresAt}">Expires soon</p>
    </div>
    <div class="footer">&copy; 2026 My Ecommerce Store</div>
</div>
</body>
</html>
