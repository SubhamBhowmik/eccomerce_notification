<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <style>
        body{font-family:Arial,sans-serif;background:#f4f4f4;margin:0}
        .container{max-width:600px;margin:40px auto;background:#fff;border-radius:12px;overflow:hidden}
        .header{background:#10b981;color:#fff;padding:40px;text-align:center}
        .body{padding:32px;text-align:center}
        .btn{display:inline-block;background:#6366f1;color:#fff;padding:14px 32px;border-radius:8px;text-decoration:none;font-weight:bold;margin-top:20px}
        .footer{text-align:center;padding:20px;font-size:12px;color:#94a3b8}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 style="margin:0">Welcome!</h1>
        <p style="margin:8px 0 0;opacity:.9">We are glad you are here</p>
    </div>
    <div class="body">
        <h2 th:text="'Hi ' + ${username} + '!'">Hi Customer!</h2>
        <p>Your account has been created successfully.</p>
        <p>Start exploring our amazing products!</p>
        <a href="#" class="btn">Shop Now</a>
    </div>
    <div class="footer">&copy; 2026 My Ecommerce Store</div>
</div>
</body>
</html>
